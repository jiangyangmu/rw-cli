apiVersion: batch/v1
kind: Job
metadata:
  name: isc-yangmu
spec:
  backoffLimit: 0
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: pathways-proxy
    spec:
      automountServiceAccountToken: false
      containers:
      - name: pathways-proxy
        image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/proxy_server:latest
        imagePullPolicy: Always
        args:
        - --server_port=29000
        - --resource_manager_address=yangmu-v7x-64-pathways-head-0-0.yangmu-v7x-64:29001
        - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
        - --virtual_slices=tpu7x:2x2x1
        env:
        ports:
        - containerPort: 29000
          protocol: TCP
        resources:
          limits:
            cpu: "16"
            memory: 100G
        securityContext:
          runAsUser: 1000  # go/gke-shipshape#rootless
          runAsGroup: 1000  # go/gke-shipshape#rootless
          readOnlyRootFilesystem: false
          capabilities:  # go/gke-shipshape#capabilities
            drop:
            - ALL
          seccompProfile:  # go/gke-shipshape#seccomp
            type: RuntimeDefault
          allowPrivilegeEscalation: false  # go/gke-shipshape#allowprivilegeescalation
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      restartPolicy: OnFailure
